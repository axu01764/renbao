<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>不到一百分就要和任做</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #1a1a2e;
  color: #fff;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* 模式选择页 */
#menu {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 20px;
}
#menu h1 {
  font-size: clamp(28px, 8vw, 48px);
  margin-bottom: 10px;
  background: linear-gradient(135deg, #e94560, #0f3460);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#menu p {
  font-size: clamp(14px, 4vw, 18px);
  color: #aaa;
  margin-bottom: 20px;
}
.mode-btn {
  width: clamp(200px, 60vw, 300px);
  padding: 16px 24px;
  font-size: clamp(16px, 5vw, 22px);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s;
  color: #fff;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.mode-btn:active { transform: scale(0.95); }
.mode-btn:nth-child(1) { background: linear-gradient(135deg, #e94560, #c23152); }
.mode-btn:nth-child(2) { background: linear-gradient(135deg, #0f3460, #16213e); }
.mode-btn:nth-child(3) { background: linear-gradient(135deg, #533483, #3b1f6e); }
.mode-btn img {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  object-fit: cover;
}

/* 游戏页 */
#game {
  display: none;
  flex-direction: column;
  height: 100vh;
  position: relative;
}
#hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: rgba(0,0,0,0.6);
  z-index: 10;
  flex-shrink: 0;
}
#hud .score { font-size: clamp(20px, 6vw, 32px); font-weight: bold; }
#hud .timer {
  font-size: clamp(20px, 6vw, 32px);
  font-weight: bold;
  color: #e94560;
}
#countdown {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  justify-content: center;
  align-items: center;
  font-size: clamp(60px, 20vw, 120px);
  font-weight: bold;
  color: #e94560;
}

/* 棋盘 - 4列网格 */
#board {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  background: #16213e;
}
.row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  flex-shrink: 0;
}
.cell {
  aspect-ratio: 1;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.cell.active {
  background: rgba(233,69,96,0.15);
}
.cell.active img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}
.cell.wrong {
  background: rgba(255,0,0,0.5) !important;
}
.cell.correct {
  background: rgba(0,255,100,0.3) !important;
}

/* 底部行高亮 */
.row.current {
  border: 2px solid rgba(233,69,96,0.4);
}

/* 游戏结束遮罩 */
#gameOverOverlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 50;
  justify-content: center;
  align-items: center;
  font-size: clamp(30px, 10vw, 60px);
  font-weight: bold;
  color: #e94560;
}

/* 结果页 */
#result {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 20px;
}
#result h2 {
  font-size: clamp(24px, 7vw, 40px);
  color: #e94560;
}
#result .final-score {
  font-size: clamp(60px, 18vw, 120px);
  font-weight: bold;
  background: linear-gradient(135deg, #e94560, #533483);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#result .comment {
  font-size: clamp(16px, 4vw, 22px);
  color: #aaa;
}
#result .game-over-reason {
  font-size: clamp(14px, 3.5vw, 18px);
  color: #e94560;
}
.result-btn {
  padding: 14px 40px;
  font-size: clamp(16px, 5vw, 20px);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: #fff;
  font-weight: bold;
  transition: transform 0.2s;
  margin-top: 10px;
}
.result-btn:active { transform: scale(0.95); }
#restartBtn { background: linear-gradient(135deg, #e94560, #c23152); }
#backBtn { background: linear-gradient(135deg, #0f3460, #16213e); }
</style>
</head>
<body>

<!-- 模式选择 -->
<div id="menu">
  <h1>还没有靠枕</h1>
  <p>选择模式开始游戏</p>
  <div style="display:flex;flex-direction:column;gap:16px;">
    <button class="mode-btn" onclick="selectMode('任')">
      <img src="任.jpg" alt="">任
    </button>
    <button class="mode-btn" onclick="selectMode('翔')">
      <img src="翔.jpg" alt="">翔
    </button>
    <button class="mode-btn" onclick="selectMode('？？？')">
      <img src="？？？.jpg" alt="">？？？
    </button>
  </div>
</div>

<!-- 游戏 -->
<div id="game">
  <div id="hud">
    <div class="score">分数: <span id="scoreDisplay">0</span></div>
    <div class="timer"><span id="timerDisplay">15.0</span>s</div>
  </div>
  <div id="countdown"></div>
  <div id="gameOverOverlay"></div>
  <div id="board"></div>
</div>

<!-- 结果 -->
<div id="result">
  <h2>游戏结束！</h2>
  <div class="final-score" id="finalScore">0</div>
  <div class="game-over-reason" id="gameOverReason"></div>
  <div class="comment" id="comment"></div>
  <button class="result-btn" id="restartBtn" onclick="restartGame()">再来一局</button>
  <button class="result-btn" id="backBtn" onclick="backToMenu()">返回选择</button>
</div>

<script>
const GAME_DURATION = 15;
const VISIBLE_ROWS = 6;

let currentMode = '';
let currentImage = '';
let score = 0;
let timeLeft = GAME_DURATION;
let gameRunning = false;
let gameOverReason = '';
let rows = []; // each row: { el, activeCol }
let timerInterval = null;

const modeImages = {
  '任': '任.jpg',
  '翔': '翔.jpg',
  '？？？': '？？？.jpg'
};

function selectMode(mode) {
  currentMode = mode;
  currentImage = modeImages[mode];
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  startCountdown();
}

function startCountdown() {
  const cd = document.getElementById('countdown');
  cd.style.display = 'flex';
  let count = 3;
  cd.textContent = count;
  const iv = setInterval(() => {
    count--;
    if (count > 0) {
      cd.textContent = count;
    } else {
      cd.textContent = 'GO!';
      setTimeout(() => {
        cd.style.display = 'none';
        startGame();
      }, 400);
      clearInterval(iv);
    }
  }, 700);
}

function createRow() {
  const activeCol = Math.floor(Math.random() * 4);
  const rowEl = document.createElement('div');
  rowEl.className = 'row';

  for (let c = 0; c < 4; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.col = c;
    if (c === activeCol) {
      cell.classList.add('active');
      cell.innerHTML = `<img src="${currentImage}" alt="">`;
    }
    cell.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      handleCellClick(cell, c);
    });
    rowEl.appendChild(cell);
  }

  return { el: rowEl, activeCol };
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  // Rows are displayed top-to-bottom; bottom row = rows[rows.length-1] is the current one to click
  for (const row of rows) {
    board.appendChild(row.el);
    row.el.classList.remove('current');
  }
  // Mark bottom row as current
  if (rows.length > 0) {
    rows[rows.length - 1].el.classList.add('current');
  }
}

function handleCellClick(cell, col) {
  if (!gameRunning) return;

  const bottomRow = rows[rows.length - 1];
  const clickedRow = cell.closest('.row');

  // Only bottom row counts; ignore taps on other rows to avoid mis-touch failures.
  if (clickedRow !== bottomRow.el) {
    return;
  }

  if (col === bottomRow.activeCol) {
    // Correct!
    cell.classList.add('correct');
    score++;
    document.getElementById('scoreDisplay').textContent = score;

    // Remove bottom row and add new row on top
    setTimeout(() => {
      bottomRow.el.remove();
      rows.pop();
      const newRow = createRow();
      rows.unshift(newRow);
      renderBoard();
    }, 80);
  } else {
    // Wrong cell - game over
    cell.classList.add('wrong');
    // Show which one was correct
    const correctCell = bottomRow.el.children[bottomRow.activeCol];
    correctCell.style.border = '3px solid #00ff66';
    endGame('点错位置了！');
  }
}

function startGame() {
  score = 0;
  timeLeft = GAME_DURATION;
  gameRunning = true;
  gameOverReason = '';
  rows = [];

  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('timerDisplay').textContent = GAME_DURATION.toFixed(1);
  document.getElementById('timerDisplay').style.color = '#e94560';
  document.getElementById('gameOverOverlay').style.display = 'none';

  // Create initial rows
  for (let i = 0; i < VISIBLE_ROWS; i++) {
    rows.push(createRow());
  }
  renderBoard();

  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if (timeLeft <= 0) {
      timeLeft = 0;
      endGame('时间到！');
    }
    document.getElementById('timerDisplay').textContent = timeLeft.toFixed(1);
    if (timeLeft <= 5) {
      document.getElementById('timerDisplay').style.color = '#ff0000';
    }
  }, 100);
}

function endGame(reason) {
  gameRunning = false;
  gameOverReason = reason;
  clearInterval(timerInterval);

  const overlay = document.getElementById('gameOverOverlay');
  overlay.textContent = reason;
  overlay.style.display = 'flex';

  setTimeout(() => {
    document.getElementById('game').style.display = 'none';
    document.getElementById('result').style.display = 'flex';
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOverReason').textContent = reason;

    let comment = '';
    if (score >= 100) comment = '太强了！手速之神！';
    else if (score >= 70) comment = '非常厉害！';
    else if (score >= 40) comment = '还不错哦~';
    else if (score >= 20) comment = '继续加油！';
    else comment = '再练练吧~';
    document.getElementById('comment').textContent = `${currentMode} 模式 - ${comment}`;
  }, 1000);
}

function restartGame() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  startCountdown();
}

function backToMenu() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}

// Prevent scrolling on mobile
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
